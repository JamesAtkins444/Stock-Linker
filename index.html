<!DOCTYPE html>
<html>
<head>
  <title>Stock Link Generator</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f7fb;
      padding: 40px;
      margin: 0;
    }

    .container {
      max-width: 800px;
      margin: auto;
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    }

    h1 {
      margin-top: 0;
    }

    button {
      background: #4f46e5;
      color: white;
      border: none;
      padding: 10px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      margin-right: 10px;
    }

    button:hover {
      background: #4338ca;
    }

    #dropZone {
      border: 2px dashed #ccc;
      border-radius: 10px;
      height: 140px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #666;
      margin: 20px 0;
      transition: 0.2s;
    }

    #dropZone.active {
      background: #eef2ff;
      border-color: #4f46e5;
      color: #4f46e5;
    }

    .results {
      margin-top: 20px;
    }

    .card {
      background: #fafafa;
      border-radius: 10px;
      padding: 15px;
      margin-bottom: 12px;
      border: 1px solid #eee;
    }

    .card b {
      font-size: 14px;
    }

    .meta {
      font-size: 13px;
      color: #666;
      margin: 5px 0;
    }

    .link {
      font-size: 13px;
      word-break: break-all;
      color: #4f46e5;
    }

    .copy-btn {
      margin-top: 8px;
      background: #10b981;
    }

    .copy-btn:hover {
      background: #059669;
    }

    .status {
      font-size: 14px;
      color: #666;
    }
  </style>
</head>

<body>

  <div class="container">

    <h1>Stock Link Generator</h1>
    <p class="status">Upload images to generate share links instantly</p>

    <input type="file" id="filePicker" multiple style="display:none;" />

    <button onclick="openFilePicker()">Choose Images</button>
    <button onclick="clearFiles()">Clear</button>

    <div id="dropZone">Drag & drop images here</div>

    <button onclick="uploadAll()">Get Share Links</button>

    <div class="results" id="results"></div>

  </div>

  <script>
    let files = [];

    function openFilePicker() {
      document.getElementById("filePicker").click();
    }

    function clearFiles() {
      files = [];
      updateUI();
      document.getElementById("results").innerHTML = "";
    }

    document.getElementById("filePicker").addEventListener("change", (e) => {
      files = [...files, ...e.target.files];
      updateUI();
    });

    const dropZone = document.getElementById("dropZone");

    dropZone.addEventListener("click", openFilePicker);

    dropZone.addEventListener("dragover", (e) => {
      e.preventDefault();
      dropZone.classList.add("active");
    });

    dropZone.addEventListener("dragleave", () => {
      dropZone.classList.remove("active");
    });

    dropZone.addEventListener("drop", (e) => {
      e.preventDefault();
      dropZone.classList.remove("active");

      files = [...files, ...e.dataTransfer.files];
      updateUI();
    });

    function updateUI() {
      dropZone.innerText = files.length
        ? files.length + " file(s) ready"
        : "Drag & drop images here";
    }

    async function uploadAll() {
      const resultsDiv = document.getElementById("results");

      if (!files.length) {
        resultsDiv.innerHTML = "<p class='status'>No files selected</p>";
        return;
      }

      resultsDiv.innerHTML = "<p class='status'>Processing...</p>";

      const formData = new FormData();

      for (let file of files) {
        formData.append("images", file);
      }

      try {
        const res = await fetch("/upload", {
          method: "POST",
          body: formData
        });

        const data = await res.json();

        resultsDiv.innerHTML = "";

        data.forEach((item) => {
          const div = document.createElement("div");
          div.className = "card";

          div.innerHTML = `
            <b>${item.file}</b>
            <div class="meta">Platform: ${item.platform} | ID: ${item.id}</div>
            <div class="link">
              <a href="${item.link}" target="_blank">${item.link}</a>
       //     </div>
         //   <button class="copy-btn" onclick="copyToClipboard('${item.link}')">
          //    Copy Link
         //   </button>
        //  `;

          resultsDiv.appendChild(div);
        });

      } catch (err) {
        resultsDiv.innerHTML = "<p class='status'>Error uploading files</p>";
        console.error(err);
      }
    }

    function copyToClipboard(text) {
      navigator.clipboard.writeText(text);
    }
  </script>

</body>
</html>
