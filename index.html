<!DOCTYPE html>
<html>
<head>
  <title>Stock Link Generator</title>
</head>
<body style="font-family: Arial; padding: 20px;">

  <h2>Drag & Drop Stock Images</h2>

  <input type="file" id="filePicker" multiple style="display:none;" />
  <button onclick="openFilePicker()">Choose Images</button>

  <br><br>

  <div id="dropZone" style="
    width: 100%;
    height: 150px;
    border: 2px dashed #888;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 20px;
  ">
    Drop images here
  </div>

  <button onclick="uploadAll()">Get Share Links</button>

  <h3>Results:</h3>
  <div id="results"></div>

  <script>
    let files = [];

    function openFilePicker() {
      document.getElementById("filePicker").click();
    }

    document.getElementById("filePicker").addEventListener("change", (e) => {
      files = [...files, ...e.target.files];
      updateUI();
    });

    const dropZone = document.getElementById("dropZone");

    dropZone.addEventListener("click", openFilePicker);

    dropZone.addEventListener("dragover", (e) => {
      e.preventDefault();
      dropZone.style.background = "#eee";
    });

    dropZone.addEventListener("dragleave", () => {
      dropZone.style.background = "";
    });

    dropZone.addEventListener("drop", (e) => {
      e.preventDefault();
      dropZone.style.background = "";

      files = [...files, ...e.dataTransfer.files];
      updateUI();
    });

    function updateUI() {
      dropZone.innerText = files.length + " file(s) ready";
    }

    async function uploadAll() {
      const resultsDiv = document.getElementById("results");
      resultsDiv.innerHTML = "Processing...";

      const formData = new FormData();

      for (let file of files) {
        formData.append("images", file); // IMPORTANT: matches server
      }

      try {
        const res = await fetch("/upload", {
          method: "POST",
          body: formData
        });

        const data = await res.json();

        resultsDiv.innerHTML = "";

        data.forEach((link, index) => {
          const item = document.createElement("div");
          item.style.marginBottom = "15px";

          item.innerHTML =
            "<b>" + files[index].name + "</b><br>" +
            "<a href='" + link + "' target='_blank'>" + link + "</a>";

          resultsDiv.appendChild(item);
        });

      } catch (err) {
        resultsDiv.innerHTML = "Error uploading files";
        console.error(err);
      }
    }
  </script>

</body>
</html>
