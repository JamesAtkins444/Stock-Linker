<!DOCTYPE html>
<html>
<head>
  <title>Stock Link Generator</title>
</head>

<body style="font-family: Arial; padding: 20px;">

  <h2>Stock Link Generator</h2>

  <!-- Hidden file input -->
  <input type="file" id="filePicker" multiple style="display:none;" />

  <!-- Buttons -->
  <button onclick="openFilePicker()">Choose Images</button>

  <br><br>

  <!-- Drag & Drop Zone -->
  <div id="dropZone" style="
    width: 100%;
    height: 150px;
    border: 2px dashed #888;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 20px;
  ">
    Drop images here
  </div>

  <button onclick="uploadAll()">Get Share Links</button>

  <h3>Results:</h3>
  <div id="results"></div>

  <script>
    let files = [];

    function openFilePicker() {
      document.getElementById("filePicker").click();
    }

    // File picker selection
    document.getElementById("filePicker").addEventListener("change", (e) => {
      files = [...files, ...e.target.files];
      updateUI();
    });

    const dropZone = document.getElementById("dropZone");

    // Click dropzone to open picker
    dropZone.addEventListener("click", openFilePicker);

    // Drag over
    dropZone.addEventListener("dragover", (e) => {
      e.preventDefault();
      dropZone.style.background = "#eee";
    });

    // Drag leave
    dropZone.addEventListener("dragleave", () => {
      dropZone.style.background = "";
    });

    // Drop files
    dropZone.addEventListener("drop", (e) => {
      e.preventDefault();
      dropZone.style.background = "";

      files = [...files, ...e.dataTransfer.files];
      updateUI();
    });

    // Update UI text
    function updateUI() {
      dropZone.innerText = files.length + " file(s) ready";
    }

    // Upload function
    async function uploadAll() {
      const resultsDiv = document.getElementById("results");
      resultsDiv.innerHTML = "Processing...";

      const formData = new FormData();

      for (let file of files) {
        formData.append("images", file); // MUST match server
      }

      try {
        const res = await fetch("/upload", {
          method: "POST",
          body: formData
        });

        const data = await res.json();

        resultsDiv.innerHTML = "";

        data.forEach((item) => {
          const div = document.createElement("div");
          div.style.marginBottom = "15px";

          div.innerHTML =
            "<b>" + item.file + "</b><br>" +
            "Platform: " + item.platform + "<br>" +
            "ID: " + item.id + "<br>" +
            "<a href='" + item.link + "' target='_blank'>" + item.link + "</a><br>" +
            "<button onclick=\"copyToClipboard('" + item.link + "')\">Copy Link</button>";

          resultsDiv.appendChild(div);
        });

      } catch (err) {
        resultsDiv.innerHTML = "Error uploading files";
        console.error(err);
      }
    }

    // Copy to clipboard
    function copyToClipboard(text) {
      navigator.clipboard.writeText(text);
      alert("Link copied!");
    }
  </script>

</body>
</html>
