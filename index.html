<!DOCTYPE html>
<html>
<head>
  <title>Stock Link Generator</title>
</head>
<body style="font-family: Arial; padding: 20px;">

  <h2>Drag & Drop Stock Images</h2>
  <input type="file" id="filePicker" multiple style="display:none;" />
  <button onclick="openFilePicker()">Choose Images</button>
  <br><br>
  <div id="dropZone" style="
    width: 100%;
    height: 150px;
    border: 2px dashed #888;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 20px;
  ">
    Drop images here
  </div>

  <button onclick="uploadAll()">Get Share Links</button>

  <h3>Results:</h3>
  <div id="results"></div>

  <script>
    function openFilePicker() {
  document.getElementById("filePicker").click();
}

document.getElementById("filePicker").addEventListener("change", (e) => {
  files = [...files, ...e.target.files];

  document.getElementById("dropZone").innerText =
    files.length + " file(s) ready";
});
    let files = [];

    const dropZone = document.getElementById("dropZone");
    dropZone.addEventListener("click", openFilePicker);
    dropZone.addEventListener("dragover", (e) => {
      e.preventDefault();
      dropZone.style.background = "#eee";
    });

    dropZone.addEventListener("dragleave", () => {
      dropZone.style.background = "";
    });

    dropZone.addEventListener("drop", (e) => {
      e.preventDefault();
      dropZone.style.background = "";

      files = [...files, ...e.dataTransfer.files];

      dropZone.innerText = files.length + " file(s) ready";
    });

    async function uploadAll() {
      const resultsDiv = document.getElementById("results");
      resultsDiv.innerHTML = "";

      for (let file of files) {
        const formData = new FormData();
        formData.append("image", file);

        const res = await fetch("http://localhost:3000/upload", {
          method: "POST",
          body: formData
        });

        const data = await res.json();

        const item = document.createElement("div");
        item.style.marginBottom = "15px";

        item.innerHTML =
          "<b>" + file.name + "</b><br>" +
          "Platform: " + data.platform + "<br>" +
          "ID: " + data.extractedId + "<br>" +
          "<a href='" + data.link + "' target='_blank'>" + data.link + "</a>";

        resultsDiv.appendChild(item);
      }
    }
  </script>

</body>
</html>
